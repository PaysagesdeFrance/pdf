name: MAJ PLU/RLP depuis BANATIC

on:
  schedule:
    - cron: '43 5 2 * *'    # le 2 de chaque mois, 05h43 UTC
  workflow_dispatch:         # déclenchement manuel (onglet Actions)

permissions:
  contents: write

jobs:
  maj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests openpyxl

      - name: Régénérer plu et rlp
        run: python .github/scripts/maj_banatic.py

      - name: Commit si changement
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plu rlp
          if git diff --cached --quiet; then
            echo "Aucun changement — pas de commit."
          else
            git commit -m "MAJ automatique PLU/RLP (BANATIC, $(date -u +%d/%m/%Y))"
            git push
          fi
